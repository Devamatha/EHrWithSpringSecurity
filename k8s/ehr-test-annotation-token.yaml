apiVersion: apps/v1
kind: Deployment
metadata:
  name: ehr-test-annotation-token
  labels:
    app: ehr-spring-security
  annotations:
    cocreate.io/deploy-spec-id: "test-123"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ehr-test-annotation-token
  template:
    metadata:
      labels:
        app: ehr-test-annotation-token
      annotations:
        cocreate.io/deploy-spec-id: "test-123"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ehr-spring-security
          image: ghcr.io/devamatha/ehr-spring-security:latest
          ports:
            - containerPort: 8080
          env:
            - name: COCREATE_WORKLOAD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cocreate-workload-token
                  key: token
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: workload-token
          secret:
            secretName: cocreate-workload-token
