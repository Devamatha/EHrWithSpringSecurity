# =============================================================================
# STAGING ENVIRONMENT - Workload (DeploySpec)
# =============================================================================
# Environment enforces: BASELINE pod security, DEFAULT network policy,
#   RESTRICTED secrets, STRICT workload policy, Approval required (1)
#
# BASELINE pod security (auto-enforced by namespace):
#   - Pods with privileged:true will be REJECTED
#   - Pods with hostNetwork/hostPID/hostIPC will be REJECTED
#   - Running as root is still allowed
#   - No securityContext needed if you don't use privileged features
#
# DEFAULT network policy (auto-created in namespace):
#   - Ingress from same namespace: ALLOWED
#   - Ingress from cocreate-system: ALLOWED
#   - Ingress from kube-system: ALLOWED
#   - All other ingress: BLOCKED
#   - All egress: ALLOWED
#
# RESTRICTED secrets (auto-enforced by platform):
#   - Only environment-scoped secrets can be referenced
#
# STRICT workload policy (auto-enforced by admission webhook):
#   - Workload token must be injected
#
# Resource Quota & LimitRange: auto-applied by environment
#   (8 CPU / 16Gi memory quota, defaults assigned if not specified)
#
# Approval: Required (1 approver) — enforced by platform before sync
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ehr-spring-security
  labels:
    app: ehr-spring-security
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ehr-spring-security
  template:
    metadata:
      labels:
        app: ehr-spring-security
    spec:
      containers:
        - name: ehr-spring-security
          image: ghcr.io/devamatha/ehr-spring-security:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "staging"
            # RESTRICTED secrets — must be environment-scoped secrets only
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ehr-staging-db-credentials
                  key: password
            # STRICT workload policy — token auto-validated by admission webhook
            - name: COCREATE_WORKLOAD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cocreate-workload-token
                  key: token
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          # Resources optional — environment's LimitRange provides defaults
          # ResourceQuota (8 CPU / 16Gi) limits total namespace consumption
---
apiVersion: v1
kind: Service
metadata:
  name: ehr-spring-security
  labels:
    app: ehr-spring-security
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app: ehr-spring-security
